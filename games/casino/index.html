<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELL CASINO HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hub-menu" class="screen active">
        <h1 class="neon-text">CASINO HUB</h1>
        <div class="balance-board">ТВОЙ КЭШ: <span class="cash-value">...</span> 💰</div>
        
        <div class="games-grid">
            <div class="game-card" data-target="game-slots">
                <div class="card-icon">🎰</div>
                <h3>Слоты</h3>
                <p>Классика. Джекпот x100</p>
            </div>
            <div class="game-card" data-target="game-wheel">
                <div class="card-icon">🎡</div>
                <h3>Колесо</h3>
                <p>Множители до x5</p>
            </div>
            <div class="game-card" data-target="game-cases">
                <div class="card-icon">📦</div>
                <h3>Кейсы</h3>
                <p>Лутбоксы за 50 💰</p>
            </div>
        </div>
    </div>

    <div id="game-slots" class="screen hidden">
        <div class="header-bar">
            <button class="btn-back">🔙 НАЗАД</button>
            <div class="mini-balance"><span class="cash-value">...</span> 💰</div>
        </div>
        
        <div class="slot-machine">
            <div class="reel" id="reel-0">🍒</div>
            <div class="reel" id="reel-1">🍒</div>
            <div class="reel" id="reel-2">🍒</div>
        </div>
        
        <div class="controls">
            <button class="bet-btn" id="slot-down">-</button>
            <div class="bet-display">BET: <span id="slot-bet">10</span></div>
            <button class="bet-btn" id="slot-up">+</button>
        </div>
        <button id="btn-spin-slots" class="btn-action">КРУТИТЬ!</button>
        <div id="slot-msg" class="msg-box">ГОТОВ?</div>
    </div>

    <div id="game-wheel" class="screen hidden">
        <div class="header-bar">
            <button class="btn-back">🔙 НАЗАД</button>
            <div class="mini-balance"><span class="cash-value">...</span> 💰</div>
        </div>
        
        <div class="wheel-container">
            <div class="wheel-pointer">▼</div>
            <div id="wheel" class="wheel">
                </div>
        </div>
        
        <div class="controls">
            <button class="bet-btn" id="wheel-down">-</button>
            <div class="bet-display">BET: <span id="wheel-bet">10</span></div>
            <button class="bet-btn" id="wheel-up">+</button>
        </div>
        <button id="btn-spin-wheel" class="btn-action">ВРАЩАТЬ!</button>
        <div id="wheel-msg" class="msg-box">ВЫБЕРИ СТАВКУ</div>
    </div>

    <div id="game-cases" class="screen hidden">
        <div class="header-bar">
            <button class="btn-back">🔙 НАЗАД</button>
            <div class="mini-balance"><span class="cash-value">...</span> 💰</div>
        </div>
        
        <h2 class="neon-text" style="font-size:24px;">ЦЕНА: 50 💰</h2>
        <div class="cases-container">
            <div class="case" data-id="0">📦</div>
            <div class="case" data-id="1">📦</div>
            <div class="case" data-id="2">📦</div>
        </div>
        <div id="cases-msg" class="msg-box">ВЫБЕРИ КЕЙС</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
