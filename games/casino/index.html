<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MELL CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        <div id="ui-layer">
            <div id="balance-display">BALANCE: <span id="balance-value">...</span> 💰</div>
            <div id="message-display">WAITING FOR BALANCE...</div>
            
            <div id="controls-wrapper">
                <div class="controls">
                    <button id="btn-bet-down">-</button>
                    <div id="bet-display">BET: <span id="bet-value">10</span></div>
                    <button id="btn-bet-up">+</button>
                </div>
                <button id="btn-spin">SPIN!</button>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
